<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Stackly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=14">
    <style>
        .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; background: radial-gradient(circle at top right, rgba(138, 125, 250, 0.15), transparent); }
        .auth-card { max-width: 450px; width: 100%; padding: 3.5rem; text-align: center; }
        .role-selector { display: flex; gap: 1rem; margin-bottom: 2rem; justify-content: center; }
        .role-option { border: 1px solid var(--border-color); padding: 0.8rem 1.5rem; border-radius: 12px; cursor: pointer; transition: 0.3s; flex: 1; font-weight: 500; }
        .role-option.active { border-color: var(--primary); background: rgba(138, 125, 250, 0.05); color: var(--primary); }
        .form-switch { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- Premium Preloader -->
    <div id="preloader">
        <div class="loader-content">
            <div class="loader-signal-container">
                <div class="loader-signal-bar"></div>
                <div class="loader-signal-bar"></div>
                <div class="loader-signal-bar"></div>
                <div class="loader-signal-bar"></div>
                <div class="loader-signal-bar"></div>
                <div class="loader-signal-bar"></div>
                <div class="loader-signal-bar"></div>
                <div class="loader-signal-bar"></div>
                <div class="loader-core">
                    <img src="assets/stackly.webp" alt="Loading" class="loader-logo logo-img">
                </div>
            </div>
            <div class="loader-bar-container">
                <div class="loader-bar"></div>
            </div>
            <div class="loader-text">Authenticating Identity</div>
        </div>
    </div>

    <header class="header" style="background: transparent; border: none; backdrop-filter: none;">
        <div class="nav container" style="justify-content: center;">
            <div class="logo">
                <a href="index.html">
                    <img src="assets/stackly.webp" alt="Stackly" class="logo-img">
                </a>
            </div>
        </div>
    </header>

    <main class="login-page">
        <div class="auth-card glass-panel reveal">
            <div id="login-form-view" class="form-switch active">
                <h2 style="margin-bottom: 1rem;">Welcome <span class="gradient-text">Back</span></h2>
                <div class="role-selector">
                    <div class="role-option active" data-role="user">User</div>
                    <div class="role-option" data-role="admin">Admin</div>
                </div>
                <form id="loginForm">
                    <div class="form-group" style="text-align: left;">
                        <label>Email ID</label>
                        <input type="email" id="email" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group" style="text-align: left;">
                        <label>Password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary-full">Authenticate &nbsp; <i class="fa-solid fa-arrow-right"></i></button>
                    <p style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">Don't have an account? <a href="#" style="color: var(--primary); font-weight: 600;">Create Account</a></p>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        const roleOptions = document.querySelectorAll('.role-option');
        roleOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                roleOptions.forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
            });
        });

        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const activeRole = document.querySelector('.role-option.active').getAttribute('data-role');
            const userEmail = document.getElementById('email').value;
            localStorage.setItem('stackly_role', activeRole);
            localStorage.setItem('stackly_email', userEmail);
            
            const submitBtn = loginForm.querySelector('button');
            submitBtn.innerHTML = "Authenticating Neural ID...";

            setTimeout(() => {
                if (activeRole === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'user-dashboard.html';
                }
            }, 1000);
        });
    </script>
</body>
</html>
