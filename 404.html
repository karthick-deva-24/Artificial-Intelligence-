<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Neural Sync Lost | Stackly</title>
    <meta name="description" content="The page you are looking for does not exist in the Stackly neural network.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=14">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            overflow: hidden;
            background: #050510;
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        /* ── Animated grid background ── */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(138,125,250,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(138,125,250,0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: grid-drift 20s linear infinite;
            z-index: 0;
        }
        @keyframes grid-drift {
            0%   { transform: translateY(0); }
            100% { transform: translateY(60px); }
        }

        /* ── Floating orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            z-index: 0;
            animation: orb-float 8s ease-in-out infinite;
        }
        .orb-1 { width: 500px; height: 500px; background: #8a7dfa; top: -150px; left: -150px; animation-delay: 0s; }
        .orb-2 { width: 400px; height: 400px; background: #635bff; bottom: -100px; right: -100px; animation-delay: 3s; }
        .orb-3 { width: 300px; height: 300px; background: #4ecdc4; top: 50%; left: 50%; animation-delay: 1.5s; }
        @keyframes orb-float {
            0%, 100% { transform: translateY(0) scale(1); }
            50%       { transform: translateY(-30px) scale(1.05); }
        }

        /* ── Main card ── */
        .error-card {
            position: relative;
            z-index: 10;
            max-width: 680px;
            width: 100%;
            padding: 4rem 3rem;
            background: rgba(10, 10, 20, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(138, 125, 250, 0.2);
            border-radius: 24px;
            box-shadow: 0 0 80px rgba(138, 125, 250, 0.1), 0 40px 80px rgba(0,0,0,0.5);
            animation: card-in 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        @keyframes card-in {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Glitching 404 number ── */
        .error-code {
            font-size: clamp(5rem, 20vw, 9rem);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -4px;
            background: linear-gradient(135deg, #8a7dfa, #635bff, #b8b0ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            display: inline-block;
            animation: glitch-main 3s infinite;
            margin-bottom: 0.5rem;
        }
        .error-code::before,
        .error-code::after {
            content: '404';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #8a7dfa, #635bff, #b8b0ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .error-code::before {
            animation: glitch-top 3s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
            left: -3px;
            opacity: 0.7;
        }
        .error-code::after {
            animation: glitch-bottom 3s infinite;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
            left: 3px;
            opacity: 0.7;
        }
        @keyframes glitch-main {
            0%, 90%, 100% { transform: none; }
            91%  { transform: skewX(-1deg); }
            93%  { transform: skewX(1deg); }
        }
        @keyframes glitch-top {
            0%, 90%, 100% { transform: none; opacity: 0; }
            91% { transform: translate(-4px, -2px); opacity: 0.7; }
            93% { transform: translate(4px, 2px); opacity: 0.7; }
        }
        @keyframes glitch-bottom {
            0%, 90%, 100% { transform: none; opacity: 0; }
            91% { transform: translate(4px, 2px); opacity: 0.7; }
            93% { transform: translate(-4px, -2px); opacity: 0.7; }
        }

        /* ── Status badge ── */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(138,125,250,0.1);
            border: 1px solid rgba(138,125,250,0.3);
            border-radius: 50px;
            padding: 0.4rem 1.2rem;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #8a7dfa;
            margin-bottom: 1.5rem;
        }
        .status-dot {
            width: 7px;
            height: 7px;
            background: #ff6b6b;
            border-radius: 50%;
            animation: blink 1.2s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; box-shadow: 0 0 6px #ff6b6b; }
            50%       { opacity: 0.2; box-shadow: none; }
        }

        /* ── Terminal text ── */
        .terminal-line {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            color: #4ecdc4;
            margin: 1.5rem auto;
            max-width: 440px;
            text-align: left;
            padding: 1rem 1.5rem;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            border-left: 3px solid #4ecdc4;
            overflow: hidden;
            white-space: nowrap;
        }
        .typed-text { display: inline-block; animation: typing 3s steps(50,end) forwards; }
        @keyframes typing {
            from { width: 0; }
            to   { width: 100%; }
        }
        .cursor-blink {
            display: inline-block;
            width: 7px;
            height: 14px;
            background: #4ecdc4;
            margin-left: 2px;
            vertical-align: middle;
            animation: cursor-pulse 0.7s step-end infinite;
        }
        @keyframes cursor-pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        /* ── Headings ── */
        .error-title {
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 700;
            margin-bottom: 1rem;
            animation: fade-up 0.8s 0.3s both;
        }
        .error-desc {
            color: rgba(176,176,197,0.8);
            font-size: 1rem;
            line-height: 1.7;
            max-width: 440px;
            margin: 0 auto 2.5rem;
            animation: fade-up 0.8s 0.5s both;
        }
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Signal wave ── */
        .signal-ring {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-bottom: 2rem;
            animation: fade-up 0.8s 0.2s both;
        }
        .signal-bar {
            width: 4px;
            border-radius: 10px;
            background: #8a7dfa;
            opacity: 0.3;
        }
        .signal-bar:nth-child(1) { height: 12px; animation: signal 1.2s 0.0s ease-in-out infinite; }
        .signal-bar:nth-child(2) { height: 22px; animation: signal 1.2s 0.1s ease-in-out infinite; }
        .signal-bar:nth-child(3) { height: 30px; animation: signal 1.2s 0.2s ease-in-out infinite; }
        .signal-bar:nth-child(4) { height: 22px; animation: signal 1.2s 0.3s ease-in-out infinite; }
        .signal-bar:nth-child(5) { height: 12px; animation: signal 1.2s 0.4s ease-in-out infinite; }
        @keyframes signal {
            0%, 100% { opacity: 0.2; transform: scaleY(0.6); }
            50%       { opacity: 1; transform: scaleY(1); background: #8a7dfa; filter: drop-shadow(0 0 6px #8a7dfa); }
        }

        /* ── Buttons ── */
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fade-up 0.8s 0.7s both;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.9rem 2rem;
            background: linear-gradient(135deg, #8a7dfa, #635bff);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(138,125,250,0.3);
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(138,125,250,0.5);
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.9rem 2rem;
            background: transparent;
            color: #8a7dfa;
            text-decoration: none;
            font-weight: 600;
            border-radius: 12px;
            font-size: 0.95rem;
            border: 1px solid rgba(138,125,250,0.3);
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            background: rgba(138,125,250,0.08);
            border-color: #8a7dfa;
            transform: translateY(-3px);
        }

        /* ── Floating particles ── */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: #8a7dfa;
            border-radius: 50%;
            opacity: 0;
            animation: particle-rise linear infinite;
        }
        @keyframes particle-rise {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* ── Divider ── */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #8a7dfa, transparent);
            margin: 1.5rem auto;
            border-radius: 10px;
        }

        /* ── Error code fade bottom ── */
        .error-code-wrap {
            animation: fade-up 0.8s 0.1s both;
        }
    </style>
</head>
<body>

    <!-- Background layers -->
    <div class="grid-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Main card -->
    <div class="error-card">

        <!-- Status badge -->
        <div class="status-badge">
            <span class="status-dot"></span>
            Neural Sync Error
        </div>

        <!-- Glitch 404 -->
        <div class="error-code-wrap">
            <div class="error-code">404</div>
        </div>

        <!-- Signal bars -->
        <div class="signal-ring">
            <div class="signal-bar"></div>
            <div class="signal-bar"></div>
            <div class="signal-bar"></div>
            <div class="signal-bar"></div>
            <div class="signal-bar"></div>
        </div>

        <div class="divider"></div>

        <!-- Title & desc -->
        <h1 class="error-title">Neural Link <span style="background: linear-gradient(135deg,#8a7dfa,#b8b0ff); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;">Severed</span></h1>
        <p class="error-desc">The intelligence cluster you are searching for does not exist within our current neural mapping. The node may have been decommissioned or relocated.</p>

        <!-- Terminal output -->
        <div class="terminal-line">
            <span class="typed-text">$ stackly resolve --node=unknown → CLUSTER_NOT_FOUND</span><span class="cursor-blink"></span>
        </div>

        <!-- CTA buttons -->
        <div class="btn-group">
            <a href="index.html" class="btn-home">
                <i class="fa-solid fa-house"></i> Return to Core
            </a>
            <a href="javascript:history.back()" class="btn-back">
                <i class="fa-solid fa-arrow-left"></i> Go Back
            </a>
        </div>

    </div>

    <!-- Floating particles (JS generated) -->
    <script>
        // Generate floating particles
        for (let i = 0; i < 25; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 10 + 8) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
            p.style.background = Math.random() > 0.5 ? '#8a7dfa' : '#4ecdc4';
            document.body.appendChild(p);
        }
    </script>

</body>
</html>
